<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Forensic Economic Calculator{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">Forensic Economic Calculator</a>
    <nav>
      <a href="/earnings">Economic loss</a>
      <a href="/lcp">Life care plan</a>
      <a href="/lhhs">Household services</a>
      <a href="/cases">Saved cases</a>
    </nav>
    <span class="user">
      {% if user %}{{ user }} &middot; <a href="/auth/logout">Sign out</a>{% endif %}
    </span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
