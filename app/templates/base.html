<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Forensic Economic Calculator{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">Forensic Economic Calculator</a>
    <nav>
      <a href="/earnings">Economic loss</a>
      <a href="/lcp">Life care plan</a>
      <a href="/lhhs">Household services</a>
      <a href="/cases">Saved cases</a>
    </nav>
    <span class="user">
      {% if user %}{{ user }} &middot; <a href="/auth/logout">Sign out</a>{% endif %}
    </span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    // Provenance capture: lookup helpers call recordSource() with the raw data
    // they pulled, which is submitted as sources_json and rendered as the
    // raw-data appendix in the exports. De-duped by title (last write wins).
    window.caseSources = [];
    function recordSource(rec) {
      window.caseSources = window.caseSources.filter(function (s) { return s.title !== rec.title; });
      window.caseSources.push(rec);
      var f = document.getElementById('sources_json');
      if (f) f.value = JSON.stringify(window.caseSources);
    }
    document.addEventListener('DOMContentLoaded', function () {
      var f = document.getElementById('sources_json');
      if (f && f.value) { try { window.caseSources = JSON.parse(f.value) || []; } catch (e) {} }
    });
  </script>
</body>
</html>
